server:
  port: 8080

spring:
  application:
    name: flowpay-backend
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url:
      jdbc:postgresql://localhost:5432/flowpay username:
        postgres password: postgres
    jpa:
      hibernate:
        ddl-auto: update
        show-sql: true
        properties:
          hibernate:
            format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: DEBUG